; OPcache dev settings — lihat README.md "OPcache (backend & frontend-v2, Windows dev)".
; zend_extension TIDAK di-declare di sini — base image php:8.4-cli sudah generate
; docker-php-ext-opcache.ini yang memuatnya; declare ulang di sini bikin "Cannot load
; Zend OPcache - it was already loaded" tiap proses PHP start.
; validate_timestamps=1 tetap aktif di dev agar auto-pakai versi terbaru file begitu
; di-save (source di-bind-mount). revalidate_freq=2 (bukan 0) — stat() tiap file yang
; di-include jadi cuma dicek maks tiap 2 detik, bukan tiap request; bind mount di Docker
; Desktop Windows ~2x lebih lambat stat()-nya dibanding named volume, revalidate_freq=0
; bikin overhead itu numpuk tiap request (diukur: ~0.7-1.25s/request cuma dari ini).
[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=65407
opcache.validate_timestamps=1
opcache.revalidate_freq=2

[PHP]
memory_limit=512M
upload_max_filesize=64M
post_max_size=64M
