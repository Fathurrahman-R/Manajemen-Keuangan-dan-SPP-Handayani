; OPcache dev settings — lihat README.md "OPcache (backend & frontend-v2, Windows dev)".
; validate_timestamps=1 + revalidate_freq=0 wajib tetap aktif di dev — auto-pakai versi
; terbaru file begitu di-save (perlu karena source dibind-mount, sering berubah).
[opcache]
zend_extension=opcache
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=65407
opcache.validate_timestamps=1
opcache.revalidate_freq=0

[PHP]
memory_limit=512M
upload_max_filesize=64M
post_max_size=64M
