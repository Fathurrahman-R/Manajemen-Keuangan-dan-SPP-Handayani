; OPcache dev settings — lihat README.md "OPcache (backend & frontend-v2, Windows dev)".
; zend_extension TIDAK di-declare di sini — base image sudah generate
; docker-php-ext-opcache.ini yang memuatnya; declare ulang = duplicate-load warning.
; revalidate_freq=2 (bukan 0) — stat() per file di-include cuma dicek maks tiap 2 detik,
; bukan tiap request; bind mount Docker Desktop Windows lambat stat()-nya, revalidate_freq=0
; bikin overhead numpuk tiap request.
[opcache]
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=65407
opcache.validate_timestamps=1
opcache.revalidate_freq=2

[PHP]
memory_limit=512M
upload_max_filesize=64M
post_max_size=64M
