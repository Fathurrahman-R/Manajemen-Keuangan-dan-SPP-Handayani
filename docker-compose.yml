name: handayani

services:
  mysql:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: handayani-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    # `php artisan serve` spawns the real HTTP-handling process via Symfony Process,
    # which only forwards Laravel's hardcoded allowlist (ServeCommand::$passthroughVariables —
    # APP_ENV, PATH, etc.) to that child, silently dropping every env override set here
    # (DB_HOST, REDIS_HOST, ...). That child then falls back to the bind-mounted .env file's
    # native-dev values (127.0.0.1), causing "Connection refused" on any request touching
    # the DB. Run PHP's built-in server directly instead — it IS the container's main process,
    # so it inherits the full real environment. Command mirrors what ServeCommand itself runs.
    command: ["sh", "-c", "cd public && exec php -S 0.0.0.0:8080 ../vendor/laravel/framework/src/Illuminate/Foundation/resources/server.php"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      MAIL_HOST: mailpit
      SEED_ON_BOOT: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

  backend-queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: handayani-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    command: ["php", "artisan", "queue:work", "--queue=notifications,default", "--tries=1"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      MAIL_HOST: mailpit
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    depends_on:
      backend:
        condition: service_healthy

  backend-scheduler:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    image: handayani-backend
    restart: unless-stopped
    working_dir: /var/www/backend
    command: ["php", "artisan", "schedule:work"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      REDIS_CLIENT: predis
      MAIL_HOST: mailpit
    volumes:
      - ./backend:/var/www/backend
      - backend_vendor:/var/www/backend/vendor
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: handayani-frontend
    restart: unless-stopped
    working_dir: /var/www/frontend-v2
    # Same reason as backend's command override — see comment there.
    command: ["sh", "-c", "cd public && exec php -S 0.0.0.0:8000 ../vendor/laravel/framework/src/Illuminate/Foundation/resources/server.php"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: http://backend:8080/api
    ports:
      - "8000:8000"
    volumes:
      - ./frontend-v2:/var/www/frontend-v2
      - frontend_vendor:/var/www/frontend-v2/vendor
      - frontend_node_modules:/var/www/frontend-v2/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/up"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 90s

  frontend-vite:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: handayani-frontend
    restart: unless-stopped
    working_dir: /var/www/frontend-v2
    entrypoint: ["entrypoint.sh"]
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173"]
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: http://backend:8080/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-v2:/var/www/frontend-v2
      - frontend_vendor:/var/www/frontend-v2/vendor
      - frontend_node_modules:/var/www/frontend-v2/node_modules
    depends_on:
      frontend:
        condition: service_healthy

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    volumes:
      - ./docker/ngrok/ngrok.yml:/etc/ngrok.yml
    command: ["start", "backend", "--config", "/etc/ngrok.yml", "--log=stdout", "--log-format=logfmt"]
    ports:
      - "4040:4040"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
  backend_vendor:
  frontend_vendor:
  frontend_node_modules:
